[opener]
edit = [
  { run = "nvim %s", block = true, for = "unix" },
]

[open]
prepend_rules = [
  { mime = "text/*", use = "edit" },
  { url = "*.toml", use = "edit" },
  { url = "*.yaml", use = "edit" },
  { url = "*.yml", use = "edit" },
  { url = "*.json", use = "edit" },
  { url = "*.lua", use = "edit" },
  { url = "*.sh", use = "edit" },
]
